{{define "base"}}<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lbpanel {{version}}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;font-size:14px;background:#0f0f0f;color:#d0d0d0;min-height:100vh}
a{color:#5af;text-decoration:none}a:hover{text-decoration:underline}
nav{background:#1a1a1a;border-bottom:1px solid #333;padding:0 20px;display:flex;align-items:center;height:44px;gap:20px}
nav .brand{color:#5af;font-weight:bold;font-size:15px;margin-right:10px}
nav a{color:#aaa;font-size:13px}nav a:hover{color:#fff}
main{padding:24px;max-width:1100px}
h1{font-size:18px;margin-bottom:20px;color:#fff}
h2{font-size:15px;margin-bottom:12px;color:#ccc}
table{width:100%;border-collapse:collapse;margin-bottom:20px}
th{background:#1e1e1e;color:#888;font-size:12px;text-align:left;padding:8px 10px;border-bottom:1px solid #333}
td{padding:8px 10px;border-bottom:1px solid #222;vertical-align:middle}
tr:hover td{background:#151515}
.btn{display:inline-block;padding:6px 14px;border:1px solid #444;background:#222;color:#ccc;cursor:pointer;font-size:13px;font-family:monospace}
.btn:hover{background:#333;color:#fff;text-decoration:none}
.btn-danger{border-color:#733;color:#f88}
.btn-danger:hover{background:#400;color:#f88}
.btn-primary{border-color:#25a;color:#5af;background:#0d1a2a}
.btn-primary:hover{background:#0a1520;color:#7cf}
.btn-sm{padding:3px 10px;font-size:12px}
.card{background:#141414;border:1px solid #2a2a2a;padding:16px;margin-bottom:16px}
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;color:#888;margin-bottom:4px}
input[type=text],input[type=password],input[type=number],select,textarea{
  width:100%;padding:7px 10px;background:#1a1a1a;border:1px solid #333;color:#d0d0d0;
  font-family:monospace;font-size:13px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#25a}
.status-online{color:#4f4}
.status-offline{color:#f44}
.status-unknown{color:#888}
.status-syncing{color:#fa4}
.error{color:#f88;background:#1a0808;border:1px solid #633;padding:8px 12px;margin-bottom:12px}
.success{color:#4f8;background:#081a08;border:1px solid #363;padding:8px 12px;margin-bottom:12px}
.key-box{background:#0a1a0a;border:1px solid #2a4a2a;padding:10px;font-size:13px;color:#4f8;word-break:break-all;margin:12px 0}
.stat{display:inline-block;background:#1a1a1a;border:1px solid #2a2a2a;padding:12px 20px;margin-right:12px;margin-bottom:12px;min-width:100px}
.stat-val{font-size:22px;color:#5af;font-weight:bold}
.stat-lbl{font-size:11px;color:#666;margin-top:4px}
pre{background:#111;border:1px solid #2a2a2a;padding:12px;overflow-x:auto;font-size:12px;color:#8d8}
.nav-right{margin-left:auto;display:flex;gap:16px;align-items:center}
.flash{padding:8px 12px;border:1px solid #25a;background:#0a1a2a;margin-bottom:16px;color:#5af}
</style>
</head>
<body>
<nav>
  <span class="brand">⚖ lbpanel</span>
  <a href="/dashboard">Dashboard</a>
  <a href="/nodes">Nodes</a>
  <a href="/sites">Sites</a>
  <a href="/caddy">Caddy</a>
  <a href="/logs">Logi</a>
  <a href="/setup">Setup</a>
  <div class="nav-right">
    <a href="/password">Hasło</a>
    <form method="post" action="/logout" style="display:inline">
      <button class="btn btn-sm">Wyloguj</button>
    </form>
  </div>
</nav>
<main>
{{template "content" .}}
</main>
</body>
</html>{{end}}
