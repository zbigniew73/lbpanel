{{define "content"}}
<h1>Zmiana hasła</h1>
<div class="card" style="max-width:400px">
  {{if .Success}}<div class="success">✓ Hasło zostało zmienione pomyślnie.</div>{{end}}
  {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
  <form method="post" action="/password">
    <div class="form-group">
      <label>Aktualne hasło</label>
      <input type="password" name="current" autofocus>
    </div>
    <div class="form-group">
      <label>Nowe hasło (min. 8 znaków)</label>
      <input type="password" name="new_password">
    </div>
    <div class="form-group">
      <label>Powtórz nowe hasło</label>
      <input type="password" name="confirm">
    </div>
    <button type="submit" class="btn btn-primary">Zmień hasło</button>
    <a href="/dashboard" class="btn" style="margin-left:8px">Anuluj</a>
  </form>
</div>
{{end}}

{{template "base" .}}
